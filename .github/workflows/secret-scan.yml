name: Secret Scan

# Defense-in-depth: this catches a real credential the moment it's pushed,
# even though nothing in this project should ever hardcode one. GitHub's
# own native push-protection (Settings -> Code security -> Secret scanning)
# is free and automatic for *public* repos, but for a *private* repo on an
# individual account it requires a paid GitHub Advanced Security license --
# gitleaks does the same job for free regardless of plan or visibility.

on:
  push:
  pull_request:
  workflow_dispatch: {}

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history, so it isn't just diffing the latest commit

      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITHUB_TOKEN above is created automatically by Actions for every
          # run -- nothing to add in Settings > Secrets for this to work.
          # GITLEAKS_LICENSE is only needed if this repo is owned by a GitHub
          # *organization*; personal-account repos don't need one.
